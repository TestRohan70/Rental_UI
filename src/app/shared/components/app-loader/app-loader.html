@if (loader.isVisible()) {
  <div class="loader-overlay" role="alert" aria-live="assertive" aria-busy="true">
    <div class="loader-card">
      <app-brand-logo size="lg" [animate]="true" [interactive]="false" />

      <p class="loader-brand">PREMISUS <span class="loader-brand-360">360</span></p>
      <h2 class="loader-title">{{ loader.message() }}</h2>
      <p class="loader-subtitle">{{ loader.subtitle() }}</p>

      <div class="loader-dots" aria-hidden="true">
        <span class="dot dot-blue"></span>
        <span class="dot dot-cyan"></span>
        <span class="dot dot-green"></span>
      </div>
    </div>
  </div>
}
